version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20  # Use Node.js v20 as required by vite-builder
        - npm ci
    build:
      commands:
        - npx nuxi build
  artifacts:
    baseDirectory: .output
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*